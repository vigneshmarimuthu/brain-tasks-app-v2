version: 0.0
Resources:
  - myService:
      Type: AWS::EKS::Service
      Properties:
        ClusterName: brain-cluster
        Namespace: default
        Name: brain-service
Hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root
  AfterAllowTestTraffic:
    - location: scripts/after_allow_test_traffic.sh
      timeout: 300
      runas: root
  BeforeAllowTraffic:
    - location: scripts/before_allow_traffic.sh
      timeout: 300
      runas: root
  AfterAllowTraffic:
    - location: scripts/after_allow_traffic.sh
      timeout: 300
      runas: root
